name: CD - Deploy Locale

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy Locale con Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Pull images from Docker Hub
        run: |
          echo "📦 Pull immagini da Docker Hub..."
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/nutritionists-backend:latest
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/nutritionists-flask:latest
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/nutritionists-frontend:latest

      - name: Start containers
        run: |
          echo "🐳 Avvio container..."
          docker-compose up -d
          sleep 10

      - name: Health check - Spring Boot
        run: |
          echo "🏥 Verifica Spring Boot..."
          curl -f http://localhost:8080/api/health || exit 1
          echo "✅ Spring Boot OK"

      - name: Health check - Flask
        run: |
          echo "🏥 Verifica Flask..."
          curl -f http://localhost:5000/health || exit 1
          echo "✅ Flask OK"

      - name: Deployment complete
        run: |
          echo "========================================="
          echo "🎉 DEPLOY COMPLETATO CON SUCCESSO!"
          echo "========================================="
          echo "🔧 API Spring: http://localhost:8080/api"
          echo "🔧 API Flask: http://localhost:5000"
          echo "========================================="