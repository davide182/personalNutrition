name: CD - Deploy Locale

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  wait-for-ci:
    name: Aspetta che il CI finisca
    runs-on: ubuntu-latest
    steps:
      - name: Aspetta 30 secondi
        run: sleep 30

  deploy:
    name: Deploy Locale con Docker Compose
    runs-on: ubuntu-latest
    needs: wait-for-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Pull images from Docker Hub (con tentativi)
        run: |
          echo "📦 Pull immagini da Docker Hub..."
          
          pull_with_retry() {
            local max_attempts=5
            local attempt=1
            local image=$1
            
            while [ $attempt -le $max_attempts ]; do
              echo "Tentativo $attempt di $max_attempts per $image..."
              if docker pull $image; then
                echo "✅ $image scaricata con successo!"
                return 0
              fi
              echo "❌ Tentativo $attempt fallito. Aspetto 10 secondi..."
              sleep 10
              attempt=$((attempt + 1))
            done
            
            echo "❌ Impossibile scaricare $image dopo $max_attempts tentativi"
            return 1
          }
          
          pull_with_retry ${{ secrets.DOCKER_HUB_USERNAME }}/nutritionists-backend:latest
          pull_with_retry ${{ secrets.DOCKER_HUB_USERNAME }}/nutritionists-flask:latest
          pull_with_retry ${{ secrets.DOCKER_HUB_USERNAME }}/nutritionists-frontend:latest

      - name: Create .env file
        run: |
          echo "📄 Creazione .env..."
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=nutritionists_db" >> .env

      - name: Start containers
        run: |
          echo "🐳 Avvio container..."
          docker compose up -d
          sleep 10

      - name: Check running containers
        run: |
          echo "📊 Container in esecuzione:"
          docker ps

      - name: Health check - Spring Boot
        run: |
          echo "🏥 Verifica Spring Boot..."
          curl -f http://localhost:8080/api/health || exit 1
          echo "✅ Spring Boot OK"

      - name: Health check - Flask
        run: |
          echo "🏥 Verifica Flask..."
          curl -f http://localhost:5000/health || exit 1
          echo "✅ Flask OK"

      - name: Deployment complete
        run: |
          echo "========================================="
          echo "🎉 DEPLOY COMPLETATO CON SUCCESSO!"
          echo "========================================="
          echo "🔧 API Spring: http://localhost:8080/api"
          echo "🔧 API Flask: http://localhost:5000"
          echo "========================================="