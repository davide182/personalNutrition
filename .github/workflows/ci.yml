name: CI - Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    name: Test Spring Boot
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Spring Boot Tests
        run: |
          cd backend-spring
          mvn clean test -DskipTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend-spring/target/surefire-reports/

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Build Spring Backend Image
        run: |
          cd backend-spring
          docker build -t nutritionists-backend:latest .

      - name: Build Flask Backend Image
        run: |
          cd backend-flask
          docker build -t nutritionists-flask:latest .

      - name: Build Frontend Image
        run: |
          cd frontend   # <--- QUI LA MODIFICA
          docker build -t nutritionists-frontend:latest .

      - name: Verify images built successfully
        run: |
          docker images | grep nutritionists