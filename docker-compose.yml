services:
  postgres:
    image: postgres:16
    container_name: nutritionists_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nutritionists_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nutritionists_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: nutritionists_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - nutritionists_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  spring-backend:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: nutritionists_spring
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nutritionists_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/nutritionists_logs
      FLASK_API_URL: http://flask-backend:5000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - nutritionists_network

  flask-backend:
    build:
      context: ./backend-flask
      dockerfile: Dockerfile
    container_name: nutritionists_flask
    restart: unless-stopped
    environment:
      ORS_API_KEY: ${ORS_API_KEY:-}
    ports:
      - "5000:5000"
    networks:
      - nutritionists_network

volumes:
  postgres_data:
    name: nutritionists_postgres_data
  mongodb_data:
    name: nutritionists_mongodb_data

networks:
  nutritionists_network:
    name: nutritionists_network
    driver: bridge