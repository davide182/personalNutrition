# ===========================================
# CONFIGURAZIONE SERVER
# ===========================================
server.port=8080
spring.application.name=nutritionists-backend

# ===========================================
# DATABASE POSTGRESQL
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/nutritionists_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================================
# JPA / HIBERNATE
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================================
# MONGODB (per logging)
# ===========================================
spring.data.mongodb.uri=mongodb://localhost:27017/nutritionists_logs

# ===========================================
# JWT
# ===========================================
jwt.secret=MiaChiaveSegretaMoltoLungaPerJWTAlmeno256BitPerHS256Algorithm2024
jwt.expiration=86400000

# ===========================================
# SWAGGER / OPENAPI
# ===========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===========================================
# EMAIL - BREVO SMTP (300 email/giorno GRATIS)
# ===========================================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=ad12d6001@smtp-brevo.com
spring.mail.password=DLHtwvO9U71xjMCf
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com

# Modalità email - ATTIVA EMAIL REALI
app.email.enabled=true
app.email.fake=false

# ===========================================
# GEOCODING (Nominatim - OpenStreetMap)
